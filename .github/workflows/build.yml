name: Build & Test

on: [ push ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-22.04-arm, macos-14, windows-2022 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build on Windows with MSVC
        if: matrix.os == 'windows-2022'
        run: .github/workflows/make_msvc_win64.bat

      - name: Build on Linux and macOS
        if: matrix.os != 'windows-2022'
        run: bash csbuild/make.sh

      - name: Build and run unit tests (Linux/macOS)
        if: matrix.os != 'windows-2022'
        run: |
          cmake -DCS_BUILD_TESTS=ON -S . -B cmake-build/unix
          cmake --build cmake-build/unix --target cs_unit_tests -- -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          cp cmake-build/unix/unit_tests/cs_unit_tests build/bin/
          build/bin/cs_unit_tests

      - name: Build and run unit tests (Windows MSVC)
        if: matrix.os == 'windows-2022'
        run: |
          cmake -DCS_BUILD_TESTS=ON -S . -B cmake-build/msvc_win64
          cmake --build cmake-build/msvc_win64 --config MinSizeRel --target cs_unit_tests
          copy cmake-build\msvc_win64\unit_tests\MinSizeRel\cs_unit_tests.exe build\bin\
          build\bin\cs_unit_tests.exe

      - name: Integration Tests
        run: |
          build/bin/cs -v
          build/bin/cs tests/benchmark.csc
          build/bin/cs tests/test_reentrant_co.csc
          build/bin/cs tests/test_dead_co.csc
          build/bin/cs tests/struct_op.csc
          build/bin/cs tests/inherit.csc

      - uses: actions/upload-artifact@v4
        with:
          name: covscript-${{ matrix.os }}
          path: build
